<svg width="100%" viewBox="0 0 680 566" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Shevere Autoservicio - Logo Final</title>
  <desc>Logo rediseñado con símbolo de dólar para Shevere Autoservicio</desc>
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060d07"/>
      <stop offset="100%" stop-color="#0c1e0e"/>
    </linearGradient>
    <linearGradient id="gn6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1a7a40"/>
    </linearGradient>
    <linearGradient id="sv6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <linearGradient id="pill6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a2e14"/>
      <stop offset="50%" stop-color="#1E8449"/>
      <stop offset="100%" stop-color="#0a2e14"/>
    </linearGradient>
    <linearGradient id="circbg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f0c"/>
      <stop offset="100%" stop-color="#050e07"/>
    </linearGradient>
    <filter id="sh6">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="ts6">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.9"/>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowMed">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="25" y="12" width="630" height="536" rx="24" fill="url(#bg6)" filter="url(#sh6)"/>
  <rect x="25" y="12" width="630" height="4" rx="2" fill="url(#gn6)"/>
  <rect x="25" y="544" width="630" height="4" rx="2" fill="url(#gn6)"/>
  <rect x="25" y="12" width="5" height="52" rx="2.5" fill="url(#gn6)"/>
  <rect x="25" y="12" width="52" height="5" rx="2.5" fill="url(#gn6)"/>
  <rect x="650" y="12" width="5" height="52" rx="2.5" fill="url(#gn6)"/>
  <rect x="603" y="12" width="52" height="5" rx="2.5" fill="url(#gn6)"/>
  <rect x="25" y="504" width="5" height="52" rx="2.5" fill="url(#gn6)"/>
  <rect x="25" y="548" width="52" height="5" rx="2.5" fill="url(#gn6)"/>
  <rect x="650" y="504" width="5" height="52" rx="2.5" fill="url(#gn6)"/>
  <rect x="603" y="548" width="52" height="5" rx="2.5" fill="url(#gn6)"/>

  <circle cx="340" cy="155" r="96" fill="none" stroke="#27AE60" stroke-width="1" stroke-dasharray="4 6" stroke-opacity="0.4"/>
  <circle cx="340" cy="155" r="88" fill="url(#circbg6)" stroke="#27AE60" stroke-width="3"/>
  
  <!-- H Central -->
  <rect x="296" y="108" width="14" height="94" rx="4" fill="url(#sv6)" filter="url(#ts6)"/>
  <rect x="370" y="108" width="14" height="94" rx="4" fill="url(#sv6)" filter="url(#ts6)"/>
  <rect x="296" y="147" width="88" height="16" rx="4" fill="url(#sv6)" filter="url(#ts6)"/>

  <!-- $ Grande en el emblema -->
  <text x="340" y="182" font-family="Georgia, serif" font-size="96" font-weight="900" fill="url(#gn6)" text-anchor="middle" filter="url(#glowBig)">$</text>

  <!-- Línea divisoria -->
  <line x1="190" y1="265" x2="490" y2="265" stroke="#27AE60" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="190" cy="265" r="3.5" fill="#27AE60"/>
  <circle cx="490" cy="265" r="3.5" fill="#27AE60"/>

  <!-- Nombre $HEVERE -->
  <text x="84" y="352" font-family="Georgia, serif" font-size="110" font-weight="900" fill="url(#gn6)" text-anchor="start" filter="url(#glowMed)">$</text>
  <text x="158" y="345" font-family="Georgia, serif" font-size="86" font-weight="700" fill="url(#sv6)" text-anchor="start" letter-spacing="2" filter="url(#ts6)">HEVERE</text>

  <!-- Línea verde bajo el nombre -->
  <rect x="60" y="362" width="560" height="2.5" rx="1.25" fill="url(#gn6)"/>

  <!-- AUTOSERVICIO PÍLDORA -->
  <rect x="185" y="380" width="310" height="50" rx="25" fill="url(#pill6)"/>
  <text x="340" y="412" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">AUTOSERVICIO</text>

  <!-- TAGLINE -->
  <text x="340" y="458" font-family="Arial, sans-serif" font-size="11.5" fill="#27AE60" text-anchor="middle" letter-spacing="4" opacity="0.85">HOGAR · CANASTA FAMILIAR · MÁS</text>
</svg>
